<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Snake · Neon Slither</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0a0f1a 0%, #0b1120 100%);
            font-family: 'Poppins', 'Segoe UI', system-ui, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        /* animated orbs */
        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 40%, rgba(80, 200, 120, 0.08) 3%, transparent 3.5%),
                        radial-gradient(circle at 85% 70%, rgba(0, 255, 200, 0.06) 2%, transparent 2.5%);
            background-size: 60px 60px, 80px 80px;
            pointer-events: none;
        }

        .game-wrapper {
            max-width: 650px;
            width: 100%;
            background: rgba(12, 18, 34, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 3rem;
            border: 1px solid rgba(50, 200, 120, 0.35);
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.6), 0 0 0 1px rgba(100, 255, 160, 0.1) inset;
            padding: 1.5rem;
            transition: all 0.3s;
            z-index: 2;
        }

        .game-header {
            text-align: center;
            margin-bottom: 1.2rem;
        }

        .game-header h1 {
            font-size: 2.4rem;
            background: linear-gradient(135deg, #C0FFB0, #6EFFA8, #2BD67B);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.2));
        }

        .stats-panel {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            background: rgba(0, 0, 0, 0.45);
            border-radius: 2rem;
            padding: 0.6rem 1.4rem;
            margin-bottom: 1.2rem;
            backdrop-filter: blur(5px);
            flex-wrap: wrap;
            gap: 0.8rem;
        }

        .stat {
            display: flex;
            gap: 0.6rem;
            align-items: baseline;
            font-weight: 600;
            background: rgba(20, 30, 50, 0.6);
            padding: 0.3rem 1rem;
            border-radius: 3rem;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #88ddbb;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(145deg, #E2FFE8, #B0FFD0);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            line-height: 1;
        }

        .highscore {
            background: rgba(0, 255, 150, 0.15);
            border: 0.5px solid #2ecc71;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 1.8rem;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.5), 0 0 0 2px rgba(60, 220, 130, 0.2) inset;
            background-color: #0a111f;
            cursor: pointer;
            width: 100%;
            height: auto;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin: 1.2rem 0 0.8rem;
            flex-wrap: wrap;
        }

        .action-btn {
            background: linear-gradient(145deg, #1e2a3a, #111a28);
            border: none;
            padding: 0.5rem 1.4rem;
            border-radius: 2.5rem;
            font-weight: 600;
            color: #caf5e5;
            font-family: inherit;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            backdrop-filter: blur(4px);
        }

        .action-btn:hover {
            background: linear-gradient(145deg, #2e4058, #1f2e46);
            transform: scale(0.96);
            color: white;
            border-color: #4cffb0;
        }

        .status-message {
            text-align: center;
            font-size: 0.85rem;
            margin-top: 0.8rem;
            color: #b3f0d0;
            background: rgba(0,0,0,0.4);
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            padding: 0.3rem 1rem;
            border-radius: 2rem;
            font-weight: 500;
        }

        footer {
            font-size: 0.7rem;
            text-align: center;
            color: #557a6e;
            margin-top: 1rem;
        }

        @media (max-width: 550px) {
            .game-wrapper { padding: 1rem; }
            .stat-value { font-size: 1.2rem; }
            .game-header h1 { font-size: 1.8rem; }
            .action-btn { padding: 0.3rem 1rem; font-size: 0.75rem; }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="game-header">
        <h1>⚡ SNAKE · NEO CLASSIC ⚡</h1>
    </div>

    <div class="stats-panel">
        <div class="stat">
            <span class="stat-label">🐍 SCORE</span>
            <span class="stat-value" id="scoreValue">0</span>
        </div>
        <div class="stat highscore">
            <span class="stat-label">🏆 BEST</span>
            <span class="stat-value" id="highScoreValue">0</span>
        </div>
        <div class="stat">
            <span class="stat-label">🎯 LENGTH</span>
            <span class="stat-value" id="lengthValue">3</span>
        </div>
    </div>

    <canvas id="snakeCanvas" width="500" height="500" style="width:100%; height:auto; max-width:500px; aspect-ratio:1/1"></canvas>

    <div class="controls">
        <button class="action-btn" id="restartBtn">⟳ RESTART</button>
        <button class="action-btn" id="pauseBtn">⏸️ PAUSE</button>
    </div>
    <div class="status-message" id="statusMsg">
        ▲ ▼ ◀ ▶   |   Press SPACE to pause
    </div>
    <footer>eat fruits · avoid walls & yourself · grow longer</footer>
</div>

<script>
    (function(){
        // ------------------- SNAKE GAME -------------------
        const canvas = document.getElementById('snakeCanvas');
        const ctx = canvas.getContext('2d');
        
        // Game settings
        const GRID_SIZE = 20;      // 20x20 grid
        const CELL_SIZE = canvas.width / GRID_SIZE; // 25px
        
        let snake = [
            {x: 10, y: 10},
            {x: 9, y: 10},
            {x: 8, y: 10},
            {x: 7, y: 10}   // length 4 start
        ];
        
        let direction = 'RIGHT';    // current direction
        let nextDirection = 'RIGHT';
        let food = {x: 15, y: 10};
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') ? parseInt(localStorage.getItem('snakeHighScore')) : 0;
        let gameLoop = null;
        let gameActive = true;
        let isPaused = false;
        let gameSpeed = 120;        // ms per frame (classic)
        
        // DOM elements
        const scoreSpan = document.getElementById('scoreValue');
        const highScoreSpan = document.getElementById('highScoreValue');
        const lengthSpan = document.getElementById('lengthValue');
        const statusMsgDiv = document.getElementById('statusMsg');
        const restartBtn = document.getElementById('restartBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        
        // init highscore UI
        highScoreSpan.innerText = highScore;
        
        // helper: random free cell (avoid snake)
        function getRandomFreeCell() {
            const totalCells = GRID_SIZE * GRID_SIZE;
            if(snake.length >= totalCells) return null; // win condition
            // simple random with attempts
            for(let attempts = 0; attempts < 2000; attempts++) {
                const randX = Math.floor(Math.random() * GRID_SIZE);
                const randY = Math.floor(Math.random() * GRID_SIZE);
                if(!snake.some(segment => segment.x === randX && segment.y === randY)) {
                    return {x: randX, y: randY};
                }
            }
            // fallback: brute force scan
            for(let i=0; i<GRID_SIZE; i++) {
                for(let j=0; j<GRID_SIZE; j++) {
                    if(!snake.some(s => s.x === i && s.y === j)) {
                        return {x: i, y: j};
                    }
                }
            }
            return null; // full board
        }
        
        // spawn new food
        function spawnFood() {
            const newFood = getRandomFreeCell();
            if(newFood) {
                food = newFood;
            } else {
                // perfect win condition: board full -> win game
                if(snake.length === GRID_SIZE * GRID_SIZE) {
                    gameActive = false;
                    if(gameLoop) clearInterval(gameLoop);
                    statusMsgDiv.innerText = "✨ PERFECT WIN! YOU FILLED THE BOARD ✨";
                    gameActive = false;
                    return;
                }
            }
        }
        
        // draw everything with neon style
        function draw() {
            if(!canvas || !ctx) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // background grid (dark)
            ctx.strokeStyle = "#1e2a3a";
            ctx.lineWidth = 0.8;
            for(let i=0; i<=GRID_SIZE; i++) {
                ctx.beginPath();
                ctx.moveTo(i * CELL_SIZE, 0);
                ctx.lineTo(i * CELL_SIZE, canvas.height);
                ctx.stroke();
                ctx.moveTo(0, i * CELL_SIZE);
                ctx.lineTo(canvas.width, i * CELL_SIZE);
                ctx.stroke();
            }
            
            // draw food (glowing fruit)
            ctx.shadowBlur = 10;
            ctx.shadowColor = "#44ffaa";
            ctx.fillStyle = "#ff4d6d";
            ctx.beginPath();
            ctx.arc(food.x * CELL_SIZE + CELL_SIZE/2, food.y * CELL_SIZE + CELL_SIZE/2, CELL_SIZE/2 - 2, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "#ffb347";
            ctx.beginPath();
            ctx.arc(food.x * CELL_SIZE + CELL_SIZE/2 - 2, food.y * CELL_SIZE + CELL_SIZE/2 - 2, 3, 0, Math.PI*2);
            ctx.fill();
            ctx.shadowBlur = 0;
            
            // draw snake with gradient
            for(let i=0; i<snake.length; i++) {
                const seg = snake[i];
                const x = seg.x * CELL_SIZE;
                const y = seg.y * CELL_SIZE;
                const grad = ctx.createLinearGradient(x, y, x+CELL_SIZE, y+CELL_SIZE);
                if(i === 0) {
                    grad.addColorStop(0, '#76ff8e');
                    grad.addColorStop(1, '#2ecc71');
                } else {
                    grad.addColorStop(0, '#3ccf7a');
                    grad.addColorStop(1, '#1f9650');
                }
                ctx.fillStyle = grad;
                ctx.fillRect(x+1, y+1, CELL_SIZE-2, CELL_SIZE-2);
                // eyes on head
                if(i === 0) {
                    ctx.fillStyle = "#FFF";
                    const eyeOff = CELL_SIZE * 0.25;
                    if(direction === 'RIGHT') {
                        ctx.fillRect(x + CELL_SIZE - 7, y + 6, 4, 4);
                        ctx.fillRect(x + CELL_SIZE - 7, y + CELL_SIZE - 10, 4, 4);
                    } else if(direction === 'LEFT') {
                        ctx.fillRect(x + 3, y + 6, 4, 4);
                        ctx.fillRect(x + 3, y + CELL_SIZE - 10, 4, 4);
                    } else if(direction === 'UP') {
                        ctx.fillRect(x + 6, y + 3, 4, 4);
                        ctx.fillRect(x + CELL_SIZE - 10, y + 3, 4, 4);
                    } else {
                        ctx.fillRect(x + 6, y + CELL_SIZE - 7, 4, 4);
                        ctx.fillRect(x + CELL_SIZE - 10, y + CELL_SIZE - 7, 4, 4);
                    }
                    ctx.fillStyle = "#000";
                    if(direction === 'RIGHT') {
                        ctx.fillRect(x + CELL_SIZE - 6, y + 7, 2, 2);
                        ctx.fillRect(x + CELL_SIZE - 6, y + CELL_SIZE - 9, 2, 2);
                    } else if(direction === 'LEFT') {
                        ctx.fillRect(x + 4, y + 7, 2, 2);
                        ctx.fillRect(x + 4, y + CELL_SIZE - 9, 2, 2);
                    } else if(direction === 'UP') {
                        ctx.fillRect(x + 7, y + 4, 2, 2);
                        ctx.fillRect(x + CELL_SIZE - 9, y + 4, 2, 2);
                    } else {
                        ctx.fillRect(x + 7, y + CELL_SIZE - 8, 2, 2);
                        ctx.fillRect(x + CELL_SIZE - 9, y + CELL_SIZE - 8, 2, 2);
                    }
                }
            }
            
            // optional glow effect
            ctx.shadowBlur = 0;
        }
        
        // core game update
        function updateGame() {
            if(!gameActive || isPaused) {
                if(isPaused) draw();
                return;
            }
            
            // commit next direction
            direction = nextDirection;
            
            // compute new head
            let newHead = {...snake[0]};
            switch(direction) {
                case 'RIGHT': newHead.x += 1; break;
                case 'LEFT':  newHead.x -= 1; break;
                case 'UP':    newHead.y -= 1; break;
                case 'DOWN':  newHead.y += 1; break;
                default: break;
            }
            
            // check food collision
            const willEat = (newHead.x === food.x && newHead.y === food.y);
            
            // perform move: insert new head
            snake.unshift(newHead);
            if(!willEat) {
                snake.pop();
            } else {
                // increase score, spawn new food
                score++;
                scoreSpan.innerText = score;
                lengthSpan.innerText = snake.length;
                if(score > highScore) {
                    highScore = score;
                    highScoreSpan.innerText = highScore;
                    localStorage.setItem('snakeHighScore', highScore);
                }
                spawnFood();
                // if spawn fails due to win, gameActive may be set false
                if(!gameActive) {
                    if(gameLoop) clearInterval(gameLoop);
                    draw();
                    return;
                }
            }
            
            // collision detection: walls or self
            const head = snake[0];
            // wall collision
            if(head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE) {
                gameOver();
                return;
            }
            // self collision (skip first segment because it's the head)
            for(let i=1; i<snake.length; i++) {
                if(snake[i].x === head.x && snake[i].y === head.y) {
                    gameOver();
                    return;
                }
            }
            
            // check win condition: if snake length fills entire grid
            if(snake.length === GRID_SIZE * GRID_SIZE) {
                gameActive = false;
                if(gameLoop) clearInterval(gameLoop);
                statusMsgDiv.innerText = "🏆 MIRACLE! YOU CONQUERED THE GRID! 🏆";
                draw();
                return;
            }
            
            draw();
        }
        
        function gameOver() {
            if(!gameActive) return;
            gameActive = false;
            if(gameLoop) clearInterval(gameLoop);
            statusMsgDiv.innerText = `💀 GAME OVER! Score: ${score} 💀  (restart)`;
            draw();
        }
        
        // restart game fully
        function restartGame() {
            // stop current interval
            if(gameLoop) clearInterval(gameLoop);
            // reset variables
            snake = [
                {x: 10, y: 10},
                {x: 9, y: 10},
                {x: 8, y: 10},
                {x: 7, y: 10}
            ];
            direction = 'RIGHT';
            nextDirection = 'RIGHT';
            score = 0;
            gameActive = true;
            isPaused = false;
            pauseBtn.innerText = "⏸️ PAUSE";
            statusMsgDiv.innerText = "▲ ▼ ◀ ▶   |   SPACE to pause";
            scoreSpan.innerText = "0";
            lengthSpan.innerText = snake.length.toString();
            // reset highscore shown remains (already stored)
            // generate random food not overlapping snake
            const initialFree = getRandomFreeCell();
            if(initialFree) food = initialFree;
            else food = {x: 15, y: 15};
            // ensure no overlap
            while(snake.some(s => s.x === food.x && s.y === food.y)) {
                food = getRandomFreeCell() || {x: 5, y: 5};
            }
            draw();
            startLoop();
        }
        
        function startLoop() {
            if(gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(() => {
                updateGame();
            }, gameSpeed);
        }
        
        // pause toggling
        function togglePause() {
            if(!gameActive) return;
            isPaused = !isPaused;
            if(isPaused) {
                pauseBtn.innerText = "▶️ START";
                statusMsgDiv.innerText = "⏸ PAUSED · press START or SPACE";
                draw();
            } else {
                pauseBtn.innerText = "⏸️ PAUSE";
                statusMsgDiv.innerText = "▲ ▼ ◀ ▶   |   SPACE to pause";
                draw();
                // update immediately to avoid lag
                updateGame();
            }
        }
        
        // direction change with opposite restriction
        function changeDirection(newDir) {
            if(!gameActive || isPaused) return;
            const opposite = {
                'UP': 'DOWN', 'DOWN': 'UP', 'LEFT': 'RIGHT', 'RIGHT': 'LEFT'
            };
            if(opposite[newDir] !== direction) {
                nextDirection = newDir;
            }
        }
        
        // Keyboard handling
        function handleKeydown(e) {
            const key = e.key;
            if(key === 'ArrowUp') {
                e.preventDefault();
                changeDirection('UP');
            } else if(key === 'ArrowDown') {
                e.preventDefault();
                changeDirection('DOWN');
            } else if(key === 'ArrowLeft') {
                e.preventDefault();
                changeDirection('LEFT');
            } else if(key === 'ArrowRight') {
                e.preventDefault();
                changeDirection('RIGHT');
            } else if(key === ' ' || key === 'Space') {
                e.preventDefault();
                if(gameActive) togglePause();
            } else if(key === 'r' || key === 'R') {
                e.preventDefault();
                restartGame();
            }
        }
        
        // Touch-friendly for mobile (basic but prevents scrolling)
        let touchStartX = 0, touchStartY = 0;
        function handleTouchStart(e) {
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            touchStartX = touch.clientX - rect.left;
            touchStartY = touch.clientY - rect.top;
            e.preventDefault();
        }
        function handleTouchEnd(e) {
            if(!gameActive || isPaused) return;
            const rect = canvas.getBoundingClientRect();
            const endX = e.changedTouches[0].clientX - rect.left;
            const endY = e.changedTouches[0].clientY - rect.top;
            const dx = endX - touchStartX;
            const dy = endY - touchStartY;
            if(Math.abs(dx) < 15 && Math.abs(dy) < 15) return;
            if(Math.abs(dx) > Math.abs(dy)) {
                if(dx > 0) changeDirection('RIGHT');
                else changeDirection('LEFT');
            } else {
                if(dy > 0) changeDirection('DOWN');
                else changeDirection('UP');
            }
            e.preventDefault();
        }
        
        // Event listeners
        window.addEventListener('keydown', handleKeydown);
        canvas.addEventListener('touchstart', handleTouchStart);
        canvas.addEventListener('touchend', handleTouchEnd);
        // prevent touchmove on canvas
        canvas.addEventListener('touchmove', (e) => e.preventDefault());
        
        restartBtn.addEventListener('click', () => restartGame());
        pauseBtn.addEventListener('click', () => togglePause());
        
        // initial spawn valid food
        function initGame() {
            restartGame();
        }
        
        // extra resize consistency
        function fixCanvasSize() {
            // maintain crisp grid drawing
            canvas.style.width = '100%';
            canvas.style.height = 'auto';
        }
        window.addEventListener('resize', () => {
            draw();
        });
        
        initGame();
    })();
</script>
</body>
</html>
