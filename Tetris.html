<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TETRIS · Classic Arcade</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0a0f1e 0%, #0c1222 100%);
            font-family: 'Poppins', 'Segoe UI', system-ui, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            position: relative;
        }

        /* animated particles */
        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle at 30% 60%, rgba(100, 80, 255, 0.08) 2%, transparent 2.5%),
                              radial-gradient(circle at 75% 30%, rgba(255, 80, 180, 0.06) 1.8%, transparent 2%);
            background-size: 55px 55px, 70px 70px;
            pointer-events: none;
        }

        .game-container {
            max-width: 900px;
            width: 100%;
            background: rgba(12, 18, 32, 0.7);
            backdrop-filter: blur(14px);
            border-radius: 2.5rem;
            border: 1px solid rgba(100, 150, 255, 0.4);
            box-shadow: 0 30px 50px -20px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.05) inset;
            padding: 1.5rem;
            transition: all 0.3s;
            z-index: 2;
        }

        .game-header {
            text-align: center;
            margin-bottom: 1.2rem;
        }

        .game-header h1 {
            font-size: 2.4rem;
            background: linear-gradient(135deg, #FFD6A0, #FF9F7C, #FF6B9D);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.3));
        }

        .tetris-layout {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1.8rem;
            align-items: flex-start;
        }

        /* main game board canvas */
        .board-section {
            position: relative;
        }

        canvas#tetrisCanvas {
            background-color: #0a1020;
            border-radius: 1.5rem;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5), 0 0 0 2px rgba(80, 150, 255, 0.2) inset;
            display: block;
            width: 100%;
            height: auto;
        }

        /* info panel */
        .info-panel {
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(8px);
            border-radius: 1.8rem;
            padding: 1.2rem;
            min-width: 160px;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .score-card {
            text-align: center;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 1.5rem;
            padding: 0.7rem;
        }

        .score-label {
            font-size: 0.75rem;
            color: #9bb8ff;
            letter-spacing: 1px;
        }

        .score-value {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(145deg, #F0F3FF, #B8D0FF);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            line-height: 1;
        }

        .next-piece {
            text-align: center;
        }

        .next-label {
            font-size: 0.8rem;
            color: #b9c8ff;
            margin-bottom: 0.5rem;
        }

        canvas#nextCanvas {
            background-color: #0a1020;
            border-radius: 1rem;
            margin: 0 auto;
            display: block;
            box-shadow: 0 5px 12px rgba(0,0,0,0.4);
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            margin-top: 0.5rem;
        }

        .ctrl-row {
            display: flex;
            justify-content: center;
            gap: 0.7rem;
            flex-wrap: wrap;
        }

        .tetris-btn {
            background: linear-gradient(145deg, #232e48, #151f34);
            border: none;
            padding: 0.4rem 0.9rem;
            border-radius: 2rem;
            font-weight: 600;
            color: #d0e2ff;
            font-family: inherit;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 3px 6px rgba(0,0,0,0.3);
        }

        .tetris-btn:hover {
            background: linear-gradient(145deg, #354a70, #202f4a);
            transform: scale(0.96);
            color: white;
        }

        .status-area {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.85rem;
            background: rgba(0,0,0,0.4);
            padding: 0.4rem;
            border-radius: 2rem;
            color: #bbd9ff;
        }

        footer {
            font-size: 0.7rem;
            text-align: center;
            color: #5f6e91;
            margin-top: 1.2rem;
        }

        @media (max-width: 650px) {
            .game-container { padding: 1rem; }
            .score-value { font-size: 1.5rem; }
            .tetris-btn { padding: 0.3rem 0.7rem; font-size: 0.65rem; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="game-header">
        <h1>◢ TETRIS ◣</h1>
    </div>

    <div class="tetris-layout">
        <div class="board-section">
            <canvas id="tetrisCanvas" width="300" height="600" style="width:100%; max-width:300px; height:auto; aspect-ratio:1/2"></canvas>
        </div>

        <div class="info-panel">
            <div class="score-card">
                <div class="score-label">🎯 SCORE</div>
                <div class="score-value" id="scoreDisplay">0</div>
            </div>
            <div class="score-card">
                <div class="score-label">📊 LINES</div>
                <div class="score-value" id="linesDisplay">0</div>
            </div>
            <div class="next-piece">
                <div class="next-label">🔮 NEXT</div>
                <canvas id="nextCanvas" width="120" height="120" style="width:100%; max-width:120px; height:auto"></canvas>
            </div>
            <div class="controls">
                <div class="ctrl-row">
                    <button class="tetris-btn" id="moveLeftBtn">◀ LEFT</button>
                    <button class="tetris-btn" id="moveRightBtn">RIGHT ▶</button>
                </div>
                <div class="ctrl-row">
                    <button class="tetris-btn" id="rotateBtn">🔄 ROTATE</button>
                    <button class="tetris-btn" id="hardDropBtn">⬇ HARD DROP</button>
                </div>
                <div class="ctrl-row">
                    <button class="tetris-btn" id="restartBtn">⟳ RESTART</button>
                    <button class="tetris-btn" id="pauseBtn">⏸️ PAUSE</button>
                </div>
            </div>
        </div>
    </div>
    <div class="status-area" id="gameStatusMsg">
        ▲ ▼ ◀ ▶  |  SPACE: pause  |  R: restart
    </div>
    <footer>classic block stacking · line clear · endless challenge</footer>
</div>

<script>
    (function(){
        // ---------- TETRIS CORE ----------
        const canvas = document.getElementById('tetrisCanvas');
        const ctx = canvas.getContext('2d');
        const nextCanvas = document.getElementById('nextCanvas');
        const nextCtx = nextCanvas.getContext('2d');
        
        // dimensions
        const COLS = 10;
        const ROWS = 20;
        const CELL_SIZE = canvas.width / COLS; // 30px
        
        // game state
        let board = Array(ROWS).fill().map(() => Array(COLS).fill(0)); // 0 = empty
        let activePiece = null;
        let nextPiece = null;
        let score = 0;
        let linesCleared = 0;
        let gameActive = true;
        let isPaused = false;
        let fallInterval = null;
        let baseSpeed = 500; // ms
        let currentSpeed = baseSpeed;
        
        // DOM elements
        const scoreDisplay = document.getElementById('scoreDisplay');
        const linesDisplay = document.getElementById('linesDisplay');
        const gameStatusSpan = document.getElementById('gameStatusMsg');
        
        // ---------- TETROMINO SHAPES ----------
        const TETROMINOS = [
            {   // I
                shape: [[1,1,1,1]],
                color: '#00e5f0'
            },
            {   // O
                shape: [[1,1],[1,1]],
                color: '#f7e05e'
            },
            {   // T
                shape: [[0,1,0],[1,1,1]],
                color: '#c458f0'
            },
            {   // S
                shape: [[0,1,1],[1,1,0]],
                color: '#5fdc7a'
            },
            {   // Z
                shape: [[1,1,0],[0,1,1]],
                color: '#f06a6a'
            },
            {   // L
                shape: [[1,0,0],[1,1,1]],
                color: '#f0a34b'
            },
            {   // J
                shape: [[0,0,1],[1,1,1]],
                color: '#5b9aff'
            }
        ];
        
        function randomTetromino() {
            const idx = Math.floor(Math.random() * TETROMINOS.length);
            const original = TETROMINOS[idx];
            // deep copy shape
            const shapeCopy = original.shape.map(row => [...row]);
            return {
                shape: shapeCopy,
                color: original.color,
                x: Math.floor((COLS - shapeCopy[0].length) / 2),
                y: 0
            };
        }
        
        // rotate shape (clockwise)
        function rotateShape(shape) {
            const rotated = shape[0].map((_, idx) => shape.map(row => row[idx]).reverse());
            return rotated;
        }
        
        // collision detection
        function collide(piece, offsetX, offsetY) {
            for(let r=0; r<piece.shape.length; r++) {
                for(let c=0; c<piece.shape[0].length; c++) {
                    if(piece.shape[r][c] !== 0) {
                        const newX = piece.x + c + offsetX;
                        const newY = piece.y + r + offsetY;
                        if(newX < 0 || newX >= COLS || newY >= ROWS || newY < 0) return true;
                        if(newY >= 0 && board[newY][newX] !== 0) return true;
                    }
                }
            }
            return false;
        }
        
        // merge active piece to board
        function mergePiece() {
            for(let r=0; r<activePiece.shape.length; r++) {
                for(let c=0; c<activePiece.shape[0].length; c++) {
                    if(activePiece.shape[r][c] !== 0) {
                        const boardX = activePiece.x + c;
                        const boardY = activePiece.y + r;
                        if(boardY >= 0 && boardY < ROWS && boardX >=0 && boardX < COLS) {
                            board[boardY][boardX] = activePiece.color;
                        }
                    }
                }
            }
            // clear lines and update score
            clearLines();
            // spawn new piece
            spawnNewPiece();
            drawAll();
        }
        
        // clear full rows and update score
        function clearLines() {
            let rowsCleared = 0;
            for(let row = ROWS-1; row >= 0; ) {
                let full = true;
                for(let col = 0; col < COLS; col++) {
                    if(board[row][col] === 0) {
                        full = false;
                        break;
                    }
                }
                if(full) {
                    // remove row
                    for(let r = row; r > 0; r--) {
                        board[r] = [...board[r-1]];
                    }
                    board[0] = Array(COLS).fill(0);
                    rowsCleared++;
                    // stay at same row index because rows shifted down
                } else {
                    row--;
                }
            }
            
            if(rowsCleared > 0) {
                // classic scoring
                const lineScores = {1: 100, 2: 300, 3: 500, 4: 800};
                const addScore = lineScores[rowsCleared] || 100 * rowsCleared;
                score += addScore;
                linesCleared += rowsCleared;
                updateScoreUI();
                // increase speed every 10 lines
                let newSpeed = Math.max(120, baseSpeed - Math.floor(linesCleared / 8) * 25);
                currentSpeed = Math.min(450, Math.max(100, newSpeed));
                resetInterval();
            }
        }
        
        function updateScoreUI() {
            scoreDisplay.innerText = score;
            linesDisplay.innerText = linesCleared;
        }
        
        // spawn new piece from nextPiece
        function spawnNewPiece() {
            if(!nextPiece) {
                nextPiece = randomTetromino();
            }
            activePiece = {
                shape: nextPiece.shape.map(row => [...row]),
                color: nextPiece.color,
                x: Math.floor((COLS - nextPiece.shape[0].length) / 2),
                y: 0
            };
            nextPiece = randomTetromino();
            
            // collision after spawn => game over
            if(collide(activePiece, 0, 0)) {
                gameActive = false;
                if(fallInterval) clearInterval(fallInterval);
                gameStatusSpan.innerText = "💀 GAME OVER 💀 · Press RESTART";
                drawAll();
                return false;
            }
            drawAll();
            return true;
        }
        
        // moves
        function movePiece(dx, dy) {
            if(!gameActive || isPaused) return false;
            if(!collide(activePiece, dx, dy)) {
                activePiece.x += dx;
                activePiece.y += dy;
                drawAll();
                return true;
            } else if(dy === 1) {
                // hit bottom -> merge
                mergePiece();
                drawAll();
                return false;
            }
            return false;
        }
        
        function rotatePiece() {
            if(!gameActive || isPaused) return;
            const originalShape = activePiece.shape;
            const rotated = rotateShape(originalShape);
            const previousShape = activePiece.shape;
            activePiece.shape = rotated;
            // check collision after rotation (adjust shift)
            if(collide(activePiece, 0, 0)) {
                // try left/right shift
                let shifted = false;
                for(let offset of [-1, 1, -2, 2]) {
                    if(!collide(activePiece, offset, 0)) {
                        activePiece.x += offset;
                        shifted = true;
                        break;
                    }
                }
                if(!shifted) {
                    activePiece.shape = previousShape; // revert
                }
            }
            drawAll();
        }
        
        function hardDrop() {
            if(!gameActive || isPaused) return;
            while(!collide(activePiece, 0, 1)) {
                activePiece.y++;
            }
            mergePiece(); // merge immediately
            drawAll();
        }
        
        // drawing modules
        function drawBoard() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // draw grid lines
            ctx.strokeStyle = "#2a3a60";
            ctx.lineWidth = 0.5;
            for(let row=0; row<=ROWS; row++) {
                ctx.beginPath();
                ctx.moveTo(0, row*CELL_SIZE);
                ctx.lineTo(canvas.width, row*CELL_SIZE);
                ctx.stroke();
            }
            for(let col=0; col<=COLS; col++) {
                ctx.beginPath();
                ctx.moveTo(col*CELL_SIZE, 0);
                ctx.lineTo(col*CELL_SIZE, canvas.height);
                ctx.stroke();
            }
            
            // draw blocks on board
            for(let row=0; row<ROWS; row++) {
                for(let col=0; col<COLS; col++) {
                    const color = board[row][col];
                    if(color !== 0) {
                        ctx.fillStyle = color;
                        ctx.shadowBlur = 4;
                        ctx.shadowColor = "rgba(0,0,0,0.5)";
                        ctx.fillRect(col*CELL_SIZE+1, row*CELL_SIZE+1, CELL_SIZE-2, CELL_SIZE-2);
                        ctx.fillStyle = "rgba(255,255,255,0.3)";
                        ctx.fillRect(col*CELL_SIZE+2, row*CELL_SIZE+2, CELL_SIZE-5, 3);
                    }
                }
            }
            // draw active piece
            if(activePiece && gameActive) {
                for(let r=0; r<activePiece.shape.length; r++) {
                    for(let c=0; c<activePiece.shape[0].length; c++) {
                        if(activePiece.shape[r][c]) {
                            const x = (activePiece.x + c) * CELL_SIZE;
                            const y = (activePiece.y + r) * CELL_SIZE;
                            ctx.fillStyle = activePiece.color;
                            ctx.fillRect(x+1, y+1, CELL_SIZE-2, CELL_SIZE-2);
                            ctx.fillStyle = "rgba(255,255,255,0.35)";
                            ctx.fillRect(x+2, y+2, CELL_SIZE-5, 4);
                        }
                    }
                }
            }
            ctx.shadowBlur = 0;
        }
        
        function drawNext() {
            nextCtx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
            nextCtx.fillStyle = "#0a1020";
            nextCtx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
            if(nextPiece) {
                const shape = nextPiece.shape;
                const color = nextPiece.color;
                const blockW = nextCanvas.width / 4;
                const shapeH = shape.length;
                const shapeW = shape[0].length;
                const offsetX = (nextCanvas.width - (shapeW * blockW)) / 2;
                const offsetY = (nextCanvas.height - (shapeH * blockW)) / 2;
                for(let r=0; r<shapeH; r++) {
                    for(let c=0; c<shapeW; c++) {
                        if(shape[r][c]) {
                            nextCtx.fillStyle = color;
                            nextCtx.fillRect(offsetX + c*blockW, offsetY + r*blockW, blockW-2, blockW-2);
                            nextCtx.fillStyle = "rgba(255,255,255,0.3)";
                            nextCtx.fillRect(offsetX + c*blockW+2, offsetY + r*blockW+2, blockW-6, 4);
                        }
                    }
                }
            }
        }
        
        function drawAll() {
            drawBoard();
            drawNext();
        }
        
        // interval management
        function resetInterval() {
            if(fallInterval) clearInterval(fallInterval);
            if(gameActive && !isPaused) {
                fallInterval = setInterval(() => {
                    if(gameActive && !isPaused) {
                        movePiece(0, 1);
                    }
                }, currentSpeed);
            }
        }
        
        function pauseToggle() {
            if(!gameActive) return;
            isPaused = !isPaused;
            if(isPaused) {
                if(fallInterval) clearInterval(fallInterval);
                gameStatusSpan.innerText = "⏸ PAUSED · press PAUSE or SPACE";
                drawAll();
            } else {
                gameStatusSpan.innerText = "▲ ▼ ◀ ▶  |  SPACE: pause";
                resetInterval();
                drawAll();
            }
        }
        
        function restartGame() {
            if(fallInterval) clearInterval(fallInterval);
            // reset board
            board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
            score = 0;
            linesCleared = 0;
            currentSpeed = baseSpeed;
            gameActive = true;
            isPaused = false;
            updateScoreUI();
            // random pieces
            nextPiece = randomTetromino();
            spawnNewPiece();  // creates active + new next
            gameStatusSpan.innerText = "▲ ▼ ◀ ▶  |  SPACE: pause";
            drawAll();
            resetInterval();
        }
        
        // keyboard events
        function handleKeyDown(e) {
            const key = e.key;
            if(!gameActive && key !== 'r' && key !== 'R') return;
            if(key === 'ArrowLeft') {
                e.preventDefault();
                movePiece(-1, 0);
            } else if(key === 'ArrowRight') {
                e.preventDefault();
                movePiece(1, 0);
            } else if(key === 'ArrowDown') {
                e.preventDefault();
                movePiece(0, 1);
            } else if(key === 'ArrowUp') {
                e.preventDefault();
                rotatePiece();
            } else if(key === ' ' || key === 'Space') {
                e.preventDefault();
                if(gameActive) pauseToggle();
            } else if(key === 'r' || key === 'R') {
                e.preventDefault();
                restartGame();
            } else if(key === 'Shift' || key === 'Control') {
                // hard drop alternative
            }
        }
        
        // buttons
        document.getElementById('moveLeftBtn').addEventListener('click', () => movePiece(-1,0));
        document.getElementById('moveRightBtn').addEventListener('click', () => movePiece(1,0));
        document.getElementById('rotateBtn').addEventListener('click', () => rotatePiece());
        document.getElementById('hardDropBtn').addEventListener('click', () => hardDrop());
        document.getElementById('restartBtn').addEventListener('click', () => restartGame());
        document.getElementById('pauseBtn').addEventListener('click', () => pauseToggle());
        
        window.addEventListener('keydown', handleKeyDown);
        
        // initial setup
        function init() {
            restartGame();
        }
        
        init();
    })();
</script>
</body>
</html>
